name: CI - Tests et Analyse

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancement des tests avec couverture
        run: |
          pytest --cov=calculatrice --cov-report=html --cov-report=term -v

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture-html
          path: htmlcov/

  analyse-statique:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installation des dependances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Outil 1 : flake8 (linter)
      - name: Analyse avec flake8
        run: |
          echo "--- Flake8 : linting du code ---"
          flake8 calculatrice.py test_calculatrice.py

      # Outil 2 : black (formatter, mode check)
      - name: Verification du formatage avec black
        run: |
          echo "--- Black : verification du formatage ---"
          black --check --line-length 100 calculatrice.py test_calculatrice.py

      # Outil 3 : mypy (type checker)
      - name: Verification des types avec mypy
        run: |
          echo "--- Mypy : verification des types ---"
          mypy calculatrice.py --ignore-missing-imports

      # Outil 4 : radon (complexite cyclomatique)
      - name: Analyse de complexite avec radon
        run: |
          echo "--- Radon : complexite cyclomatique ---"
          radon cc calculatrice.py -a -nc
